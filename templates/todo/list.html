{% extends "base.html" %}
{% load static %}
{% block content %}

<!-- Todo 목록이 출력될 영역 -->
<div class="todocontainer"></div>

<!-- 페이지네이션 영역 -->
<div class="pagination">
    <button id="prevBtn">이전</button>
	<span id="pageInfo"></span>
	<button id="nextBtn">다음</button>
</div>

<!-- Todo 생성 페이지 이동 버튼 -->
<button class="todoCreate" id="createBtn">Todo 등록하기</button>

<script>

document.addEventListener("DOMContentLoaded", function () {    // HTML 문서가 모두 로드된 후 실행되는 코드
    console.log("create loading");   // 페이지가 정상적으로 로드되었는지 확인하는 콘솔 출력

    const LOGIN_PAGE_URL = "/login/"; // 로그인 페이지 URL (세션이 없을 때 이동)
    let currentPage = 1; // 현재 페이지 번호 저장

    // -----------------------------
    // 특정 페이지의 Todo 목록을 서버에서 가져오는 함수
    // -----------------------------
    function loadPage(page) {
        api.get(`/todo/viewsets/view/?page=${page}`) // axios GET 요청 -> Django ViewSet API 호출
            .then(res => {
                const data = res.data; // 서버에서 받은 응답 데이터를 data 변수에 담아줘(axios는 응답을 res.data 안에 담아서 줘)
                renderTodos(data.data); // Todo 목록 화면에 출력
                updatePaginationUI(data); // 페이지네이션 UI 업데이트
                currentPage = data.current_page; // 현재 페이지 상태 업데이트
            })
            .catch(err => console.error("페이지 로드 실패", err));
    }

    // -----------------------------
    // Todo 목록을 화면에 출력하는 함수
    // -----------------------------
    function renderTodos(todos) { // Todo 목록을 HTML에 렌더링하는 함수
        const container = document.querySelector(".todocontainer"); // Todo 출력 영역 선택
        container.innerHTML = ""; // 기존 내용 초기화

        if (!todos || todos.length === 0) { // Todo가 없는 경우
            container.innerHTML = "<p>등록된 Todo 없음</p>"; // 메세지 출력
            return;
        }

        todos.forEach(todo => { // Todo 데이터를 반복하면서 화면에 출력
            const div = document.createElement("div"); // 새로운 <div> HTML 요소를 동적으로 생성해서 div 변수에 담아줘
            div.className = "todo-item"; // 생성한 div 요소에 "todo-item" 클래스를 추가해줘
            div.dataset.id = todo.id; // dataset -> HTML 요소에 데이터를 저장하는 속성

            const imageSrc = todo.image // 이미지 경로 처리
                 ? (todo.image.startsWith("http") ? todo.image : `${location.origin}${todo.image}`)
                : "";

            div.innerHTML = // Todo 정보 HTML 구성
            `
                <p><strong>제목:</strong> ${todo.name ?? ""}</p>
                <p><strong>설명:</strong> ${todo.description ?? ""}</p>
                <p><strong>완료 여부:</strong> ${(todo.complete ? "완료" : "미완료")}</p>
                <p><strong>exp:</strong> ${todo.exp ?? 0}</p>
                ${imageSrc ? `<img src="${imageSrc}" style="max-width:200px;">` : ""}
                <hr>
            `;

            div.addEventListener("click", () => {
                window.location.href = `/todo/detail/${todo.id}/`; // Todo 클릭 시 상세페이지 이동
            });

            container.appendChild(div); // 화면에 Todo 추가
        });
    }

    // -----------------------------
    // 페이지네이션 UI 업데이트
    // -----------------------------

    function updatePaginationUI(data) { // 페이지네이션 UI 업데이트
        const current = data.current_page ?? currentPage ?? 1;
        const total =
            data.page_count ??
                (typeof data.count === "number" && data.results
                    ? Math.ceil(data.count / data.results.length)
                    : "?");
        document.getElementById("pageInfo").innerText = `${current} / ${total}`; // 페이지 정보 출력 기능 (현재 페이지 / 전체 페이지 표시)
        document.getElementById("prevBtn").disabled = !(data.previous); // 이전 페이지 url이 없으면 버튼을 비활성화해줘
        document.getElementById("nextBtn").disabled = !(data.next); // 다음 페이지 url이 없으면 버튼을 비활성화해줘
    }

    // -----------------------------
    // 이전 페이지 버튼 클릭 이벤트
    // -----------------------------
    document.getElementById("prevBtn").addEventListener("click", () => { // 이전 버튼 클릭 이벤트
        if (currentPage > 1) loadPage(currentPage - 1); // 만약 현재 페이지가 1보다 크다면, 현재 페이지에서 -1 한 페이지로 이동
    });

    // -----------------------------
    // 다음 페이지 버튼 클릭 이벤트
    // -----------------------------
    document.getElementById("nextBtn").addEventListener("click", () => { // 다음 페이지 버튼 클릭 이벤트
        loadPage(currentPage + 1); // 현재 페이지에서 +1 한 페이지로 이동
    });

    // -----------------------------
    // Todo 생성 페이지 이동
    // -----------------------------
    document.getElementById("createBtn").addEventListener("click", () => { // Todo 생성 페이지 이동
        window.location.href = "/todo/create/"; // 이동할 url 참조
    });

    loadPage(1); // 페이지 최초 로딩 시 1페이지 데이터 요청

});

</script>

{% endblock %}
