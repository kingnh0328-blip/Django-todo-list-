{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container">
  <h2>Todo 수정</h2>

  <!-- 현재 저장된 이미지 표시 -->
  <div>
    <label>Current Image:</label><br>
    {% if todo.image %}
      <img src="{{ todo.image.url }}" alt="todo image" style="max-width:250px; height:auto;">
    {% else %}
      <p>-</p>
    {% endif %}
  </div>

  <!-- 새 이미지 업로드 -->
  <div>
    <label for="image">New Image:</label>
    <input type="file" id="image">
  </div>

  <!-- Todo 이름 입력 -->
  <div>
    <label for="name">Name:</label>
    <input type="text" name="name" id="name" value="{{ todo.name }}">
  </div>

  <!-- Todo 설명 입력 -->
  <div>
    <label for="description">Description:</label>
    <textarea name="description" id="description">{{ todo.description }}</textarea>
  </div>

  <!-- 완료 여부 체크 -->
  <div>
    <label for="complete">Complete:</label>
    <input type="checkbox" name="complete" id="complete" {% if todo.complete %}checked{% endif %}>
  </div>

  <!-- 경험치 입력 -->
  <div>
    <label for="exp">Experience Points:</label>
    <input type="number" name="exp" id="exp" min="0" value="{{ todo.exp }}">
  </div>

  <!-- 저장 버튼 -->
  <button type="button" id="todoUpdate">저장</button>

  <!-- 취소 버튼 (브라우저 이전 페이지로 이동) -->
  <button type="button" onclick="history.back()">취소</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const LOGIN_PAGE_URL = "/login/"; // 로그인 페이지 url
  const todoId = "{{ todo.id }}"; // Django 템플릿에서 전달된 todo의 id(pk)를 JavaScript 변수로 저장

  // ✅ [수정됨] 이제 세션 기반 api가 아니라, 공통 axios 인스턴스(window.api) 사용
  // ✅ 3단계: 공통 axios 인스턴스(window.api) 사용
  if (!window.api) { // ✅ [추가됨] window.api 로드 여부 확인
    console.error("window.api가 없습니다. base.html에서 static/js/api.js가 로드됐는지 확인하세요.");
    alert("설정 오류: api.js가 로드되지 않았습니다.");
    return;
  }

  // ✅ [추가됨] access 토큰이 없으면 바로 로그인으로(선택)
  const access = localStorage.getItem("access_token");
  if (!access) {
    console.log("access_token 없음 → 로그인 이동");
    window.location.href = LOGIN_PAGE_URL;
    return;
  }

  // ✅ [추가됨] 401/403 처리 로직을 함수로 분리 (기존 interceptor 대체)
  function handleAuthError(err) {
    const status = err.response?.status;
    if (status === 401 || status === 403) {
      alert("로그인이 필요합니다.");

      // ✅ [추가됨] (선택) 토큰 정리
      localStorage.removeItem("access_token");
      localStorage.removeItem("refresh_token");

      window.location.href = LOGIN_PAGE_URL;
    }
    return Promise.reject(err);
  }

  // -----------------------------
  // 저장 버튼 클릭 이벤트
  // Todo 수정 요청
  // -----------------------------
  document.getElementById("todoUpdate").addEventListener("click", async () => { // id가 todoUpdate인 버튼을 클릭하면 실행
    try {
      const formData = new FormData(); // FormData 객체 생성 (폼 데이터를 서버로 전송하기 위한 객체)
      formData.append("name", document.getElementById("name").value);
      formData.append("description",document.getElementById("description").value);
      formData.append("complete",document.getElementById("complete").checked ? "true" : "false");
      formData.append("exp", document.getElementById("exp").value || "0"); // [수정됨] exp의 기본값: 0(숫자) → "0"(문자열)로 통일
      const fileInput = document.getElementById("image"); // 이미지 input 요소 가져오기
      if (fileInput.files.length > 0) { // 새 이미지를 선택했을 경우에만 image 필드를 추가
        formData.append("image", fileInput.files[0]);  // (이미지를 변경하지 않으면 서버로 보내지 않음)
      }

      // ✅ [수정됨] 변경: window.api.patch(...) → JWT 기반
      const res = await window.api.patch(`/todo/viewsets/view/${todoId}/`, formData);
      console.log("수정 성공:", res.data); // 성공 로그
      window.location.href = `/todo/detail/${todoId}/`; // 수정 후 상세 페이지로 이동

    } catch (err) {
      // ✅ [추가됨] 인증 문제면 로그인으로 보내기
      handleAuthError(err).catch(() => {});

      // ✅ [수정됨] 실패 alert 메시지 변경 (더 구체적)
      console.error("수정 실패:", err.response?.data || err.message); // 서버 오류 또는 네트워크 오류 발생 시 콘솔에 출력
      alert("수정 실패: 콘솔/네트워크 확인");
    }
  });
});
</script>

{% endblock %}
